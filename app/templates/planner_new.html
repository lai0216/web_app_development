{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="glass-card">
            <h2 class="mb-4 text-white text-center">開啟新旅程</h2>
            <form action="{{ url_for('planner.new_planner') }}" method="POST">
                <div class="mb-3">
                    <label for="title" class="form-label text-secondary">行程名稱 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control form-control-lg" id="title" name="title" placeholder="例如：東京五天四夜大冒險" required>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="start_date" class="form-label text-secondary">出發日期</label>
                        <input type="date" class="form-control" id="start_date" name="start_date">
                    </div>
                    <div class="col-md-6 mb-4">
                        <label for="end_date" class="form-label text-secondary">回程日期</label>
                        <input type="date" class="form-control" id="end_date" name="end_date">
                    </div>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-lg">建立行程</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
